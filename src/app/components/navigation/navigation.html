<nav class="navigation">
    <ul>
        <li class="logo-container">
            <img src="/img/04_Logo/logo2.png" alt="brandlogo" class="logo-default">
            <img src="/img/04_Logo/logo1.png" alt="brandlogo hover" class="logo-hover">
        </li>

        @for (link of navLinks; track link; let i = $index) {
        <li class="nav-item nav-hover{{ i }}">
            <a [routerLink]="['/']">{{ link.label }}</a>
            <img [src]="link.img" alt="hover bild">
        </li>
        }

        <li class="language">
            <span class="language__item" [class.language__item--active]="activeLangCode === 'EN'"
                (click)="setLanguage('EN')">
                <span class="language__label">EN</span>
                <img src="/img/00_Hand-drawn-lines/00_Header/Color_option_3/Toggle.png" alt="hover sprache"
                    class="language__hover-img">
            </span>
            <div class="toggle" [class.toggle--en]="activeLangCode === 'EN'" [class.toggle--de]="activeLangCode === 'DE'">
                <div class="toggle__line"></div>
                <button class="toggle__circle"></button>
            </div>
            <span class="language__item" [class.language__item--active]="activeLangCode === 'DE'"
                (click)="setLanguage('DE')">
                <span class="language__label">DE</span>
                <img src="/img/00_Hand-drawn-lines/00_Header/Color_option_3/Toggle.png" alt="hover sprache"
                    class="language__hover-img">
            </span>
        </li>
    </ul>
</nav>
